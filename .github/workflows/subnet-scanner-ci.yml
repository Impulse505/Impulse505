name: subnet-scanner CI

on:
  push:
    branches: [main, master]
    paths:
      - "portfolio/pet-projects/subnet-scanner/**"
      - ".github/workflows/subnet-scanner-ci.yml"
  pull_request:
    paths:
      - "portfolio/pet-projects/subnet-scanner/**"
      - ".github/workflows/subnet-scanner-ci.yml"

defaults:
  run:
    working-directory: portfolio/pet-projects/subnet-scanner

jobs:
  test:
    name: pytest + lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: portfolio/pet-projects/subnet-scanner/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Run pytest
        run: pytest tests/ -v --cov=core --cov=reporting --cov=cli --cov-report=term-missing --cov-fail-under=70
