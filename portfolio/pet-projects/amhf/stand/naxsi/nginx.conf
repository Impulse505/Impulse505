# AMHF NAXSI nginx.conf (top-level).
# Server blocks live in /etc/nginx/conf.d/*.conf, rendered from templates by
# entrypoint.sh via envsubst.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 5;

    log_format main '$remote_addr - [$time_local] "$request" $status';
    access_log /var/log/nginx/access.log main;

    # NAXSI core rules (the rule definitions). Per location we then choose to
    # apply naxsi_blockall or pass through.
    include /etc/nginx/naxsi.conf;

    include /etc/nginx/conf.d/*.conf;
}
