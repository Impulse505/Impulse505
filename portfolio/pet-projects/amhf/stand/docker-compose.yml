# AMHF Stage 5 stand. Single bridge network amhf-net. Six host ports total
# (8080/8081/8090/8091 active; 8082/8092 reserved for Nemesida via fragment).
#
# Pinned versions — see stand/README.md "Version pin table".

name: amhf-stand

services:

  # ---------------------------------------------------------------------- #
  # Backends                                                               #
  # ---------------------------------------------------------------------- #

  mariadb:
    image: mariadb:10.11.10
    container_name: amhf-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: amhf_root
      MARIADB_DATABASE: dvwa
      MARIADB_USER: dvwa
      MARIADB_PASSWORD: p@ssw0rd
    networks: [amhf-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 30
    # No ports: — internal only.

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: amhf-dvwa
    # vulnerables/web-dvwa is unmaintained but is the canonical DVWA image.
    # We accept the floating tag and document the pull date in stand/README.md.
    environment:
      MYSQL_HOSTNAME: mariadb
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: p@ssw0rd
    networks: [amhf-net]
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    # DVWA's image lacks curl/wget. Use bash /dev/tcp + raw HTTP.
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c 'exec 3<>/dev/tcp/localhost/80; printf \"GET /login.php HTTP/1.0\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'"
      interval: 5s
      timeout: 5s
      retries: 60
    # No host ports — DVWA is reached only through the WAFs.

  dvwa-init:
    build:
      context: ./dvwa
    image: amhf/dvwa-init:local
    container_name: amhf-dvwa-init
    environment:
      DVWA_BASE: http://dvwa
      ADMIN_USER: admin
      ADMIN_PASS: password
    networks: [amhf-net]
    depends_on:
      dvwa:
        condition: service_healthy
    restart: "no"

  flag-app:
    build:
      context: ./flag-app
    image: amhf/flag-app:local
    container_name: amhf-flag-app
    networks: [amhf-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    # No host ports — only WAFs talk to it.

  # ---------------------------------------------------------------------- #
  # WAFs — ModSec + CRS                                                    #
  # ---------------------------------------------------------------------- #

  modsec-dvwa:
    build:
      context: ./modsec
    image: amhf/modsec:local
    container_name: amhf-modsec-dvwa
    environment:
      BACKEND_HOST: dvwa
      BACKEND_PORT: "80"
    ports:
      - "8080:8080"
    networks: [amhf-net]
    depends_on:
      dvwa:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  modsec-flag:
    image: amhf/modsec:local
    container_name: amhf-modsec-flag
    environment:
      BACKEND_HOST: flag-app
      BACKEND_PORT: "5000"
    ports:
      - "8090:8080"
    networks: [amhf-net]
    depends_on:
      modsec-dvwa:
        condition: service_started   # ensures the image is built
      flag-app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  # ---------------------------------------------------------------------- #
  # WAFs — ModSec + CRS at PARANOIA=2 (Stage 6 — stricter ruleset)         #
  # ---------------------------------------------------------------------- #

  modsec-p2-dvwa:
    image: amhf/modsec:local
    container_name: amhf-modsec-p2-dvwa
    environment:
      BACKEND_HOST: dvwa
      BACKEND_PORT: "80"
      PARANOIA: "2"
      BLOCKING_PARANOIA: "2"
    ports:
      - "8083:8080"
    networks: [amhf-net]
    depends_on:
      modsec-dvwa:
        condition: service_started   # reuse the same image build
      dvwa:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  modsec-p2-flag:
    image: amhf/modsec:local
    container_name: amhf-modsec-p2-flag
    environment:
      BACKEND_HOST: flag-app
      BACKEND_PORT: "5000"
      PARANOIA: "2"
      BLOCKING_PARANOIA: "2"
    ports:
      - "8093:8080"
    networks: [amhf-net]
    depends_on:
      modsec-dvwa:
        condition: service_started
      flag-app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  # ---------------------------------------------------------------------- #
  # WAFs — NAXSI                                                            #
  # ---------------------------------------------------------------------- #

  naxsi-dvwa:
    build:
      context: ./naxsi
    image: amhf/naxsi:local
    container_name: amhf-naxsi-dvwa
    environment:
      BACKEND_HOST: dvwa
      BACKEND_PORT: "80"
    ports:
      - "8081:80"
    networks: [amhf-net]
    depends_on:
      dvwa:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  naxsi-flag:
    image: amhf/naxsi:local
    container_name: amhf-naxsi-flag
    environment:
      BACKEND_HOST: flag-app
      BACKEND_PORT: "5000"
    ports:
      - "8091:80"
    networks: [amhf-net]
    depends_on:
      naxsi-dvwa:
        condition: service_started   # ensures the image is built
      flag-app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

networks:
  amhf-net:
    driver: bridge
