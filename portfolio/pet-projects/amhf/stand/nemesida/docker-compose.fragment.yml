# Optional Nemesida WAF Free services.
# Use only after enabling per stand/nemesida/README.md. Combine with the base file:
#   docker compose -f stand/docker-compose.yml \
#                  -f stand/nemesida/docker-compose.fragment.yml up -d

services:
  nemesida-dvwa:
    build:
      context: ./nemesida
      dockerfile: Dockerfile.disabled
    image: amhf/nemesida:local
    environment:
      BACKEND_HOST: dvwa
      BACKEND_PORT: "80"
    ports:
      - "8082:80"
    networks: [amhf-net]
    depends_on:
      dvwa:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  nemesida-flag:
    build:
      context: ./nemesida
      dockerfile: Dockerfile.disabled
    image: amhf/nemesida:local
    environment:
      BACKEND_HOST: flag-app
      BACKEND_PORT: "5000"
    ports:
      - "8092:80"
    networks: [amhf-net]
    depends_on:
      flag-app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
